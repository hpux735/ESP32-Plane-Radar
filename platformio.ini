; ESP32-C3 Super Mini + 1.28" round GC9A01 (240×240)
; Board in Arduino IDE: "ESP32C3 Dev Module" or "MakerGO ESP32 C3 SuperMini"

[env:supermini]
platform = espressif32@6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions/plane_radar.csv
extra_scripts = post:scripts/merge_firmware.py

; Anti-aliased VLW font (Noto Sans Bold 15, from TFT_eSPI smooth-font examples)
board_build.embed_files = data/ui_font.vlw

; USB serial over USB-C (Super Mini native USB)
build_flags =
  -std=gnu++17
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DWM_NODEBUG
  -DWM_MDNS

lib_deps =
  lovyan03/LovyanGFX@1.2.21
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2
  adafruit/Adafruit BME280 Library@^2.2.4
  adafruit/Adafruit Unified Sensor@^1.1.14

; ---------------------------------------------------------------------------
; Native desktop SDL emulator. Builds a Mac binary that opens a 240x240 window
; (scaled 3x) rendering the real radar UI. WiFi/HTTP/NVS are stubbed under
; USE_NATIVE — see src/host/host_stubs.cpp. Requires: `brew install sdl2`.
;   Build/run:  pio run -e native -t exec
;   Keys:       SPACE = BOOT tap (cycles range preset)
; ---------------------------------------------------------------------------
[env:native]
platform = native
build_type = debug

build_src_filter =
  +<*>
  -<main.cpp>
  -<services/wifi_setup.cpp>
  -<services/adsb_client.cpp>
  -<services/radar_location.cpp>

build_flags =
  -std=gnu++17
  -O0
  -DUSE_NATIVE
  -Iinclude
  -Ihost_shims/include
  -include Arduino.h
  -I${sysenv.HOMEBREW_PREFIX}/include/SDL2
  -L${sysenv.HOMEBREW_PREFIX}/lib
  -lSDL2

lib_deps =
  lovyan03/LovyanGFX@1.2.21
  bblanchon/ArduinoJson@^7.4.2

; ---------------------------------------------------------------------------
; Unit tests. `pio test -e native_test` runs Unity tests under test/ against
; a minimal set of hand-picked src files. Deliberately does NOT pull in SDL,
; ArduinoJson, HTTP, WiFi, or LovyanGFX — tests target pure functions only
; (weather category logic, geometry math). Add files to `build_src_filter`
; below only when a new test needs them.
; ---------------------------------------------------------------------------
[env:native_test]
platform = native
test_framework = unity
test_build_src = yes

build_src_filter =
  -<*>
  +<services/weather_category.cpp>
  +<ui/map_projection.cpp>
  +<data/tile_reader.cpp>
  +<data/tile_math.cpp>
  +<data/fallback_tile.cpp>
  +<data/tile_store.cpp>
  +<services/adsb_client.cpp>
  +<services/focus_points.cpp>
  +<services/host_test_stubs.cpp>
  +<services/metar_config.cpp>
  +<services/outdoor_temp.cpp>
  +<services/tap_sensor.cpp>
  +<services/tile_cache.cpp>
  +<services/tile_fetch.cpp>
  +<services/weather_geo.cpp>
  +<geo/ear_clip.cpp>

; ArduinoJson pulls in via focus_points.cpp; kept out of the earlier
; test set on purpose (pure-math tests don't need it, keeps native_test
; builds fast). Adding it here since focus_points is the first service
; that actually parses JSON at rest.
lib_deps =
  bblanchon/ArduinoJson@^7.4.2

build_flags =
  -std=gnu++17
  -O0
  -DUSE_NATIVE
  -DUNIT_TEST
  -Iinclude
  -Ihost_shims/include
  -include Arduino.h
