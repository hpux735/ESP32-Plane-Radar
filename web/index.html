<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#04081c" />
    <title>Plane Radar — desk toy preview</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main>
      <header class="page-title">
        <h1>Plane Radar</h1>
      </header>

      <section class="stage">
        <!-- The 240x240 canvas is the same size as the hardware panel;
             CSS scales it up for display. imageRendering=pixelated keeps
             it crisp when scaled. -->
        <canvas id="radar" width="240" height="240"></canvas>
      </section>

      <section class="controls">
        <p class="tap-hint">Tap the radar (or press <kbd>Space</kbd>) to control it</p>
        <div class="hints">
          <button type="button" class="hint" data-gesture="single">
            <kbd>tap</kbd> adjust
          </button>
          <button type="button" class="hint" data-gesture="double">
            <kbd>2×</kbd> next screen
          </button>
        </div>
      </section>

      <footer class="page-footer">
        <a href="https://github.com/benyaffe/ESP32-Plane-Radar">source</a>
        · fork of
        <a href="https://github.com/MatixYo/ESP32-Plane-Radar">MatixYo/ESP32-Plane-Radar</a>
      </footer>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
